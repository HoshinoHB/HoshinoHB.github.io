    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            /* CSS变量控制背景图 */
            --bg-image: none;
        }
        /* 背景层：已删除模糊效果 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            transform: scale(1.1); /* 消除边缘留白，不影响清晰度 */
            background-color: #fff0f9; /* 加载失败兜底底色 */
            background-image: var(--bg-image);
        }
        .title {
            color: #f088dd;
            text-shadow: 0 3px 6px #ffccefff;
            letter-spacing: 2px;
        }
        .up-main {
            background: linear-gradient(135deg, #ffbbee, #ee99ee);
            box-shadow: 0 8px 25px rgba(240, 136, 221, 0.35);
        }
        .bili-box {
            background: linear-gradient(135deg, #ff99ee 0%, #ff88dd 100%);
            border-radius: 36px;
            box-shadow: 0 12px 35px rgba(255, 136, 221, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .douyin-box {
            background: linear-gradient(135deg, #111111 0%, #000000 100%);
            border-radius: 36px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .expand-btn {
            position: absolute;
            top: 18px;
            right: 24px;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3;
            color: #fff;
            font-weight: bold;
            user-select: none;
        }
        .expand-btn:hover {
            transform: scale(1.3);
        }
        .fans-grid {
            display: grid;
            gap: 10px;
            padding: 24px;
            width: 100%;
            height: 100%;
        }
        .fans-card {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.25s all ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .fans-card:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
        }
        .fans-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            z-index: 9999 !important;
            margin: 0 !important;
            padding: 20px !important;
        }
        .fullscreen .fans-grid {
            padding: 40px;
            gap: 12px;
        }
        .fullscreen .expand-btn {
            top: 24px;
            right: 32px;
            font-size: 28px;
        }
        @media (min-width: 768px) {
            .platform-wrap {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 50px;
                padding: 30px 60px;
            }
            .bili-box, .douyin-box {
                min-height: 650px;
            }
            .fans-grid {
                grid-template-columns: repeat(8, 1fr);
                grid-template-rows: repeat(8, 1fr);
            }
            .page-indicator {
                display: block;
            }
            #comments-container {
                max-width: 1200px;
                margin: 60px auto 40px;
                padding: 30px;
                border-radius: 36px;
                background: linear-gradient(135deg, #ffbbee 0%, #ff99ee 100%);
                box-shadow: 0 12px 35px rgba(255, 136, 221, 0.3);
            }
        }
        @media (max-width: 767px) {
            .platform-wrap {
                display: flex;
                flex-direction: column;
                gap: 40px;
                padding: 20px 25px;
            }
            .bili-box, .douyin-box {
                min-height: 450px;
            }
            .fans-grid {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(4, 1fr);
            }
            .page-indicator {
                display: none;
            }
            #comments-container {
                margin: 40px 25px 30px;
                padding: 20px;
                border-radius: 24px;
                background: linear-gradient(135deg, #ffbbee 0%, #ff99ee 100%);
                box-shadow: 0 12px 35px rgba(255, 136, 221, 0.3);
            }
        }
        .page-indicator {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            color: #666;
        }
        .link-text {
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2;
        }
        .link-text:hover {
            opacity: 0.7;
            text-decoration: underline;
        }
        footer {
            text-align: center;
            padding: 20px 20px 40px;
            color: #777;
            font-size: 15px;
        }
        footer a {
            color: #f088dd;
            text-decoration: none;
            font-weight: bold;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>

        let biliPage = 1;
        let douyinPage = 1;
        const pcMax = 64;
        const mobileMax = 16;
        const defaultAvatar = "https://i0.hdslb.com/bfs/face/member/noface.jpg@168w_168h_1c.webp";
        
        function renderBili() {
            const isMobile = window.innerWidth < 768;
            const perPage = isMobile ? mobileMax : pcMax;
            const start = (biliPage-1)*perPage;
            const end = start + perPage;
            const show = biliFansList.slice(start, end);
            const box = document.querySelector('.bili-fans-grid');
            box.innerHTML = '';
            show.forEach(fan=>{
                const a = document.createElement('a');
                a.className = 'fans-card';
                const isValidLink = fan.link && fan.link !== "" && !fan.link.includes("Didn'tfindit") && !fan.link.includes("error.png");
                if (isValidLink) {
                    a.href = fan.link;
                    a.target = '_blank';
                } else {
                    a.href = "javascript:void(0)";
                    a.style.cursor = "default";
                }
                a.innerHTML = `<img src="${fan.img}" alt="粉丝头像" onerror="this.src='${defaultAvatar}'">`;
                box.append(a);
            })
        }
        
        function renderDouyin() {
            const isMobile = window.innerWidth < 768;
            const perPage = isMobile ? mobileMax : pcMax;
            const start = (douyinPage-1)*perPage;
            const end = start + perPage;
            const show = douyinFansList.slice(start, end);
            const box = document.querySelector('.douyin-fans-grid');
            box.innerHTML = '';
            show.forEach(fan=>{
                const a = document.createElement('a');
                a.className = 'fans-card';
                const isValidLink = fan.link && fan.link !== "" && !fan.link.includes("Didn'tfindit") && !fan.link.includes("error.png");
                if (isValidLink) {
                    a.href = fan.link;
                    a.target = '_blank';
                } else {
                    a.href = "javascript:void(0)";
                    a.style.cursor = "default";
                }
                a.innerHTML = `<img src="${fan.img}" alt="粉丝头像" onerror="this.src='${defaultAvatar}'">`;
                box.append(a);
            })
        }
        
        let startX = 0;
        document.addEventListener('touchstart',e=>startX = e.touches[0].screenX);
        document.addEventListener('touchend',e=>{
            const endX = e.changedTouches[0].screenX;
            const move = startX - endX;
            const isMobile = window.innerWidth <768;
            const perPage = isMobile ? mobileMax : pcMax;
            if(move >60){
                if(biliPage < Math.ceil(biliFansList.length/perPage)) biliPage++;
                if(douyinPage < Math.ceil(douyinFansList.length/perPage)) douyinPage++;
            }
            if(move <-60){
                if(biliPage>1) biliPage--;
                if(douyinPage>1) douyinPage--;
            }
            renderBili();
            renderDouyin();
            updatePageNum();
        })
        
        function updatePageNum(){
            const isMobile = window.innerWidth <768;
            const perPage = isMobile ? mobileMax : pcMax;
            const totalBili = Math.ceil(biliFansList.length/perPage);
            const totalDouyin = Math.ceil(douyinFansList.length/perPage);
            document.getElementById('biliPage').innerText = biliPage;
            document.getElementById('biliTotal').innerText = totalBili;
            document.getElementById('douyinPage').innerText = douyinPage;
            document.getElementById('douyinTotal').innerText = totalDouyin;
        }
        
        document.querySelectorAll('.expand-btn').forEach(btn=>{
            btn.onclick = function(){
                const wrap = this.parentElement;
                wrap.classList.toggle('fullscreen');
                this.innerText = wrap.classList.contains('fullscreen') ? '✕' : '☒';
                document.body.style.overflow = wrap.classList.contains('fullscreen')?'hidden':'';
            }
        })
        
        function init() {
            renderBili();
            renderDouyin();
            updatePageNum();
        }
        
        init();
        window.addEventListener('resize', init);
